name: veox_flutter
description: "VEOX AI Creative Studio — Desktop automation engine for AI video generation."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # UI / Icons
  cupertino_icons: ^1.0.8
  lucide_icons: ^0.257.0
  google_fonts: ^6.3.2
  cached_network_image: ^3.3.1

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5
  riverpod: ^2.5.1
  provider: ^6.1.5+1           # Legacy — kept during migration, removed in Phase 10

  # Navigation & Routing
  go_router: ^14.6.2

  # Persistence
  shared_preferences: ^2.5.3   # Legacy AppState — replaced incrementally
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.5

  # Secure Storage (API Keys → macOS Keychain)
  flutter_secure_storage: ^9.2.4

  # HTTP & Networking
  dio: ^5.8.0+1

  # File System
  file_picker: ^8.1.7

  # Media & Audio
  just_audio: ^0.9.42
  audioplayers: ^6.1.0

  # Image Processing
  image: ^4.2.0

  # Utils
  uuid: ^4.5.3
  intl: ^0.20.2
  logger: ^2.5.0
  equatable: ^2.0.8

  # Desktop
  window_manager: ^0.5.1

  # Browser Automation
  puppeteer: ^3.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.13
  isar_generator: ^3.1.0+1

flutter:
  uses-material-design: true
